name: Build Binaries Only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

on:
  workflow_dispatch:
    branches:
      - main
  push:
    tags:
      - '[1-2].[0-9]+.[0-9]+'

defaults:
  run:
    shell: bash

jobs:
  build-binaries:
    name: Build Vaultwarden (${{ matrix.arch }})
    # 根据架构选择 Runner：arm64 用 ARM  runner，其他用标准 ubuntu
    runs-on: ${{ contains(matrix.arch, 'arm') && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      SOURCE_COMMIT: ${{ github.sha }}
      SOURCE_REPOSITORY_URL: "https://github.com/${{ github.repository }}"
    strategy:
      matrix:
        arch: ["amd64", "arm64"]
        base_image: ["debian"]

    steps:
      # 1. 初始化 QEMU (必须步骤：确保在 x86 runner 上能构建 arm64)
      # 即使在原生 ARM runner 上运行，执行此步骤也是安全的（它会检测并跳过不必要的配置）
      - name: Initialize QEMU binfmt support
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: "arm64,arm"

      # 2. 设置 Docker Buildx
      # 保留 max-parallelism = 2 以防止 GitHub Actions OOM (内存溢出)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          cache-binary: false
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
          driver-opts: |
            network=host

      # 3. 检出代码 (fetch-depth: 0 必须保留，否则无法获取 tag 信息)
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # 4. 标准化架构名称
      - name: Normalize architecture string
        env:
          MATRIX_ARCH: ${{ matrix.arch }}
        run: |
          NORMALIZED_ARCH="${MATRIX_ARCH//\/}"
          echo "NORMALIZED_ARCH=${NORMALIZED_ARCH}" | tee -a "${GITHUB_ENV}"

      # 5. 确定版本号 (增加了对无 Tag 情况的兜底处理)
      - name: Determine Source Version
        run: |
          GIT_EXACT_TAG="$(git describe --tags --abbrev=0 --exact-match 2>/dev/null || true)"
          if [[ -n "${GIT_EXACT_TAG}" ]]; then
              echo "SOURCE_VERSION=${GIT_EXACT_TAG}" | tee -a "${GITHUB_ENV}"
          else
              GIT_LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
              if [[ -n "${GIT_LAST_TAG}" ]]; then
                  echo "SOURCE_VERSION=${GIT_LAST_TAG}-${SOURCE_COMMIT:0:8}" | tee -a "${GITHUB_ENV}"
              else
                  echo "SOURCE_VERSION=dev-${SOURCE_COMMIT:0:8}" | tee -a "${GITHUB_ENV}"
                  echo "::warning::No git tags found. Using default version."
              fi
          fi

      # 6. 构建并提取二进制文件
      # 关键修改：
      # 1. 保留 *.output=type=image,push=false,name-canonical=true,push-by-digest=true 以确保 metadata 正常生成
      # 2. 保留 *.output=type=local,dest=./output 以获取二进制文件
      # 3. 移除了 cache-from/to 的 registry 引用，改为空字符串以避免报错，但保留参数结构
      - name: Bake and Extract
        id: bake_vw
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        env:
          SOURCE_COMMIT: ${{ env.SOURCE_COMMIT }}
          SOURCE_VERSION: ${{ env.SOURCE_VERSION }}
          SOURCE_REPOSITORY_URL: ${{ env.SOURCE_REPOSITORY_URL }}
        with:
          pull: true
          source: .
          files: docker/docker-bake.hcl
          targets: "${{ matrix.base_image }}-multi"
          set: |
            *.platform=linux/${{ matrix.arch }}
            # 禁用远程缓存引用 (因为没有登录 registry)，防止 buildx 尝试读取不存在的缓存
            *.cache-from=
            *.cache-to=
            # 核心输出配置：
            # 1. 输出到本地目录供下载
            # 2. 生成镜像元数据但不推送 (push=false)，保持构建逻辑完整性
            *.output=type=local,dest=./output
            *.output=type=image,push=false,name-canonical=true,push-by-digest=true

      # 7. 稳健地重命名二进制文件
      # 原逻辑假设文件一定在 ./output/vaultwarden，这里增加检查
      - name: Rename binaries
        run: |
          echo "Files in output directory:"
          ls -la ./output
          
          # 查找 vaultwarden 二进制文件 (可能在根目录或子目录)
          BIN_PATH=$(find ./output -name "vaultwarden" -type f | head -n 1)
          
          if [[ -z "$BIN_PATH" ]]; then
            echo "::error::Binary file 'vaultwarden' not found in output directory!"
            exit 1
          fi
          
          echo "Found binary at: $BIN_PATH"
          mv "$BIN_PATH" "./vaultwarden-${{ env.NORMALIZED_ARCH }}"
          echo "Renamed to: vaultwarden-${{ env.NORMALIZED_ARCH }}"

      # 8. 上传为 Artifact
      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: vaultwarden-${{ env.SOURCE_VERSION }}-linux-${{ env.NORMALIZED_ARCH }}-${{ matrix.base_image }}
          path: vaultwarden-${{ env.NORMALIZED_ARCH }}
          retention-days: 7
          if-no-files-found: error
